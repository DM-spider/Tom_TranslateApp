services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,zh,ja,ko,fr,de,es,ru
    volumes:
      - lt_data:/home/libretranslate/.local

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: translate
      POSTGRES_PASSWORD: translate_dev
      POSTGRES_DB: translate_db
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  lt_data:
  pg_data: