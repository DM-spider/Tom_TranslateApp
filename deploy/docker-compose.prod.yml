services:
  api:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
    # 覆盖 .env 中的相对路径配置，容器内不需要从文件读取（环境变量已注入）
    environment:
      - DEPLOYMENT_MODE=docker_host_nginx
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge