services:
  web:
    build:
      context: ..
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.tomtranslate.com}
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
    # 覆盖 .env 中的相对路径配置，容器内不需要从文件读取（环境变量已注入）
    environment:
      - DEPLOYMENT_MODE=docker_host_nginx
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-translate}:${POSTGRES_PASSWORD:-translate_prod}@db:5432/${POSTGRES_DB:-translate_db}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
      - db
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-translate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-translate_prod}
      POSTGRES_DB: ${POSTGRES_DB:-translate_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  redis_data:
  postgres_data:

networks:
  app-network:
    driver: bridge