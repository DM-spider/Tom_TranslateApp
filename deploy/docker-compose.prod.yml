services:
  web:
    build:
      context: ..
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.tomtranslate.com}
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-network

  api:
    build:
      context: ../packages/backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-translate}:${POSTGRES_PASSWORD:-translate_prod}@db:5432/${POSTGRES_DB:-translate_db}
      - LIBRE_TRANSLATE_URL=http://libretranslate:5000
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - redis
      - db
      - libretranslate
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-translate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-translate_prod}
      POSTGRES_DB: ${POSTGRES_DB:-translate_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: always
    environment:
      - LT_LOAD_ONLY=zh,en,ja,ko,fr,de,es,ru
    volumes:
      - lt_data:/home/libretranslate/.local
    networks:
      - app-network

volumes:
  redis_data:
  postgres_data:
  lt_data:

networks:
  app-network:
    driver: bridge
