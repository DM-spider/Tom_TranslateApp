server {
    listen 80;
    server_name tomtranslate.com www.tomtranslate.com api.tomtranslate.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 1. 前端页面的配置
server {
    listen 443 ssl http2;
    server_name tomtranslate.com www.tomtranslate.com;

    # 共同使用这张多域名证书
    ssl_certificate /etc/letsencrypt/live/tomtranslate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tomtranslate.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/web;
    index index.html;

    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}

# 2. 后端 API 的配置
server {
    listen 443 ssl http2;
    server_name api.tomtranslate.com;

    # 同样指向上面那张多域名证书
    ssl_certificate /etc/letsencrypt/live/tomtranslate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tomtranslate.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 把请求转发给 Docker 内部的 api 容器
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 防止翻译时间长导致 504 超时
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}